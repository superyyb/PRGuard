version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic pr-events --partitions 5 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ai-results --partitions 5 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic security-results --partitions 5 --replication-factor 1
      echo 'Topics created.'
      "

  webhook-service:
    build: ./services/webhook-service
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    depends_on:
      kafka:
        condition: service_healthy

  ai-review-worker:
    build: ./services/ai-review-worker
    volumes:
      - ./services/ai-review-worker:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy

  security-scanner:
    build: ./services/security-scanner
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pr_reviews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  notifier:
    build: ./services/notifier
    volumes:
      - ./services/notifier:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL}
    depends_on:
      kafka:
        condition: service_healthy

  result-service:
    build: ./services/result-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pr_reviews
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
