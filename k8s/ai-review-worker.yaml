apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-review-worker
  namespace: prguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-review-worker
  template:
    metadata:
      labels:
        app: ai-review-worker
    spec:
      containers:
        - name: ai-review-worker
          image: githubautomation-ai-review-worker:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: prguard-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: GITHUB_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-review-worker-hpa
  namespace: prguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-review-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
