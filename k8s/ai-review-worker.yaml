apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-review-worker
  namespace: prguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-review-worker
  template:
    metadata:
      labels:
        app: ai-review-worker
    spec:
      containers:
        - name: ai-review-worker
          image: githubautomation-ai-review-worker:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: prguard-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: GITHUB_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# KEDA ScaledObject: scales based on Kafka consumer lag
# More accurate than CPU-based HPA for I/O-bound workloads like Claude API calls
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-review-worker-scaledobject
  namespace: prguard
spec:
  scaleTargetRef:
    name: ai-review-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: host.docker.internal:9092
        consumerGroup: ai-review-group
        topic: pr-events
        lagThreshold: "10"   # scale up when lag exceeds 10 messages per replica
