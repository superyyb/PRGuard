apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-review-worker
  namespace: prguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-review-worker
  template:
    metadata:
      labels:
        app: ai-review-worker
    spec:
      containers:
        - name: ai-review-worker
          image: githubautomation-ai-review-worker:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: prguard-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: GITHUB_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: ANTHROPIC_API_KEY
          livenessProbe:
            exec:
              # 检查 /tmp/healthy 在 90 秒内是否被更新过
              # 如果 poll 循环卡死（如 Claude API 无响应），文件停止更新，触发重启
              command:
                - /bin/sh
                - -c
                - "test $(( $(date +%s) - $(stat -c %Y /tmp/healthy) )) -lt 120"
            initialDelaySeconds: 15   # 等待启动完成
            periodSeconds: 30         # 每 30 秒检查一次
            failureThreshold: 3       # 连续失败 3 次（90秒无更新）才重启
          readinessProbe:
            exec:
              # 检查 /tmp/ready 是否存在，存在说明已成功订阅 Kafka topic
              command: ["cat", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# KEDA ScaledObject: scales based on Kafka consumer lag
# More accurate than CPU-based HPA for I/O-bound workloads like Claude API calls
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-review-worker-scaledobject
  namespace: prguard
spec:
  scaleTargetRef:
    name: ai-review-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.prguard.svc.cluster.local:9092
        consumerGroup: ai-review-group
        topic: pr-events
        lagThreshold: "10"   # scale up when lag exceeds 10 messages per replica
