apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
  namespace: prguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-service
  template:
    metadata:
      labels:
        app: result-service
    spec:
      containers:
        - name: result-service
          image: githubautomation-result-service:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: prguard-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: prguard-config
                  key: DATABASE_URL
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prguard-secrets
                  key: GITHUB_TOKEN
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
